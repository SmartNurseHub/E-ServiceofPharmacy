<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>Daily Check Stock</title>

<style>
body {
  font-family: Arial;
  background: #f5f6fa;
  margin: 0;
  padding: 20px;
}

h3 {
  margin-bottom: 10px;
}

.table-container {
  overflow: auto;
  max-height: 90vh;
  background: #fff;
  border-radius: 10px;
}

table {
  border-collapse: collapse;
  width: max-content;
  min-width: 100%;
  font-size: 12px;
}

th, td {
  border: 1px solid #ddd;
  padding: 6px;
  text-align: center;
  white-space: nowrap;
}

th {
  background: #2c3e50;
  color: white;
  position: sticky;
  top: 0;
}

.loading {
  padding: 10px;
  color: #666;
}

.bg-success{
  background:#28a745;
  color:#fff;
  font-weight:bold;
}

.bg-danger{
  background:#dc3545;
  color:#fff;
  font-weight:bold;
}

.bg-warning{
  background:#ffc107;
  font-weight:bold;
}

.bg-success {
  background-color: #28a745 !important;
  color: #fff !important;
  font-weight: bold;
}

.bg-danger {
  background-color: #dc3545 !important;
  color: #fff !important;
  font-weight: bold;
}

.bg-warning {
  background-color: #ffc107 !important;
  color: #000 !important;
  font-weight: bold;
}
</style>
</head>

<body>

<h3>Emergency Stock</h3>
<div style="margin-bottom:15px;display:flex;gap:10px;align-items:center;">

  <label>เดือน</label>

  <select id="monthSelect">

    <option value="1">มกราคม</option>
    <option value="2">กุมภาพันธ์</option>
    <option value="3">มีนาคม</option>
    <option value="4">เมษายน</option>
    <option value="5">พฤษภาคม</option>
    <option value="6" selected>มิถุนายน</option>
    <option value="7">กรกฎาคม</option>
    <option value="8">สิงหาคม</option>
    <option value="9">กันยายน</option>
    <option value="10">ตุลาคม</option>
    <option value="11">พฤศจิกายน</option>
    <option value="12">ธันวาคม</option>

  </select>

  <label>ปี</label>

  <select id="yearSelect">

    <option value="2025">2025</option>
    <option value="2026" selected>2026</option>
    <option value="2027">2027</option>

  </select>

</div>
<div class="table-container">
 

  <table>
    <thead>
      <tr>
        <th>CODE</th>
        <th>NAME</th>
        <th>UNIT</th>
        <th>REQUIRED</th>
        <th>1</th><th>2</th><th>3</th><th>4</th><th>5</th><th>6</th>
        <th>7</th><th>8</th><th>9</th><th>10</th><th>11</th><th>12</th>
        <th>13</th><th>14</th><th>15</th><th>16</th><th>17</th><th>18</th>
        <th>19</th><th>20</th><th>21</th><th>22</th><th>23</th><th>24</th>
        <th>25</th><th>26</th><th>27</th><th>28</th><th>29</th><th>30</th><th>31</th>
      </tr>
    </thead>

    <tbody id="tbody"></tbody>
  </table>
</div>
<script src="/modules/dailycheck/dailycheck.client.js"></script>
</body>
</html>
